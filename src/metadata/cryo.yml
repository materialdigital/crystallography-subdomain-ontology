# PURL configuration for http://purl.obolibrary.org/obo/cryo

idspace: CRYO
base_url: /obo/cryo

products:
- cryo.owl: https://raw.githubusercontent.com/cmllezr/crystallography-subdomain-ontology/main/cryo.owl
- cryo.obo: https://raw.githubusercontent.com/cmllezr/crystallography-subdomain-ontology/main/cryo.obo

term_browser: ontobee
example_terms:
- CRYO_0000000

entries:

- prefix: /releases/
  replacement: https://raw.githubusercontent.com/cmllezr/crystallography-subdomain-ontology/v

- prefix: /tracker/
  replacement: https://github.com/cmllezr/crystallography-subdomain-ontology/issues

- prefix: /about/
  replacement: http://www.ontobee.org/ontology/CRYO?iri=http://purl.obolibrary.org/obo/

## generic fall-through, serve direct from github by default
- prefix: /
  replacement: https://raw.githubusercontent.com/cmllezr/crystallography-subdomain-ontology/main/
