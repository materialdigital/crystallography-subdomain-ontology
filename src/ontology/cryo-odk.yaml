id: cryo
title: "CRYO PMD: Crystallography Subdomain Ontology based on PMDco 3.x"
github_org: cmllezr
git_main_branch: main
repo: crystallography-subdomain-ontology
uribase: https://w3id.org/pmd
uribase_suffix: cryo
preferredPrefix: CRYO
edit_format: owl

# DISABLE Templates for now
use_templates: false

# Imports 
import_group:
  annotation_properties: ['rdfs:label', 'IAO:0000119','IAO:0000115', 'IAO:0000116', 'IAO:0000112', 'skos:definition', 'skos:example', 'skos:comment', 'skos:altLabel' ]
  
  products:
    - id: pmdco
      title: "PMD Core Ontology"
      mirror_from: https://materialdigital.github.io/core-ontology/ontology.owl
      # mirror_from: https://raw.githubusercontent.com/materialdigital/core-ontology/refs/heads/main/src/ontology/pmdco.ttl
      module_type: custom
    - id: qudt
      mirror_from: https://qudt.org/qudt-all
      module_type: custom
    - id: uo
      mirror_from: https://raw.githubusercontent.com/bio-ontology-research-group/unit-ontology/refs/heads/master/uo-full.owl
      module_type: custom

# Components
components:
  products:
    - filename: imports-edit.owl
    - filename: cryo-axioms-shared.owl
    - filename: cryo-entities.owl
    - filename: cryo-individuals.owl
    - filename: cryo-qualities.owl
    - filename: cryo-shared.owl

# Release
primary_release: full
release_artefacts:
  - base
  - full
export_formats:
  - owl
  - ttl

ci:
  - github_actions

namespaces:
  - https://w3id.org/pmd/cryo/
idranges:
  - idsfor: cryo
    idprefix: https://w3id.org/pmd/cryo/CRYO_
    iddigits: 7

idranges:
  - idsfor: cryo
    idprefix: https://w3id.org/pmd/cryo/CRYO_
    iddigits: 7

idranges:
  - idsfor: cryo
    idprefix: https://w3id.org/pmd/cryo/CRYO_
    iddigits: 7

idranges:
  - idsfor: cryo
    idprefix: https://w3id.org/pmd/cryo/CRYO_
    iddigits: 7
